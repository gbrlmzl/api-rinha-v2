spring.application.name=api.rinha.v2

# ============================================================
#  Datasource
# ============================================================
spring.datasource.url=${POSTGRES_RINHA_URL}
spring.datasource.username=${POSTGRES_USERNAME}
spring.datasource.password=${POSTGRES_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ============================================================
#  JPA / Hibernate
# ============================================================
spring.jpa.properties.hibernate.jdbc.time_zone=America/Sao_Paulo
# Evita sessao Hibernate aberta durante render da view (N+1 silencioso).
spring.jpa.open-in-view=false

# ============================================================
#  Seguranca
# ============================================================
# Sem default - se faltar, app falha o startup (comportamento seguro).
api.security.token.secret=${JWT_SECRET}

# Em prod (HTTPS via Cloudflare): true. Em dev local sem HTTPS: false.
app.cookies.secure=${APP_COOKIES_SECURE:true}

# Origins permitidos pelo CORS (CSV). Local: http://localhost:3000.
# Prod: https://rinhaufpb.com (sem trailing slash).
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# Stacktrace nunca vai no body de error response (vaza estrutura interna).
spring.web.error.include-stacktrace=never

# ============================================================
#  Integracoes externas
# ============================================================
mercadopago.access.token=${MERCADOPAGO_ACCESS_TOKEN}
mercadopago.test.token=${MERCADOPAGO_TEST_TOKEN}
#mercadopago.notification.url=${MERCADOPAGO_NOTIFICATION_URL}

imgur.access.token=${IMGUR_ACCESS_TOKEN}

# ============================================================
#  Upload
# ============================================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# ============================================================
#  Email (Gmail SMTP)
# ============================================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${GMAIL_USERNAME}
spring.mail.password=${GMAIL_APP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ============================================================
#  Front
# ============================================================
app.frontend.url=${FRONTEND_URL:http://localhost:3000}

# ============================================================
#  Perfil ativo (overrides em application-{dev,prod}.properties)
# ============================================================
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}
