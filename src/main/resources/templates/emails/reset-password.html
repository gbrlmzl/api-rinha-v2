<!-- //templates/emails -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <body style="font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto; background-color: #0E1241; color: #ffffff; padding: 40px; border-radius: 8px;">

        <h1 style="color: #11B5E4;">Rinha Campus IV</h1>
        <hr style="border-color: #ff00ee;"/>

        <p>Olá, <strong th:text="${username}"></strong>!</p>
        <p>Recebemos uma solicitação para redefinir sua senha.</p>

        <div style="text-align: center; margin: 32px 0;">
            <a th:href="${resetLink}"
               style="background-color: #11B5E4; color: #ffffff; padding: 14px 32px;
                          text-decoration: none; border-radius: 24px; font-weight: bold;">
                Redefinir senha
            </a>
        </div>

        <p style="font-size: 14px;">
            Este link expira em <strong>10 minutos</strong>.
        </p>
        <p style="font-size: 14px;, mt: 1">
            Caso não tenha sido você que solicitou essa redefinição, pode ignorar este email.
        </p>
    </body>
</html>
