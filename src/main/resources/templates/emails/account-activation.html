<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body style="font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto;
             background-color: #0E1241; color: #ffffff; padding: 40px; border-radius: 8px;">

<h1 style="color: #11B5E4; margin-bottom: 8px;">Rinha Campus IV</h1>
<hr style="border-color: #ff00ee; margin-bottom: 24px;" />

<p>Olá, <strong th:text="${username}"></strong>!</p>
<p>Sua conta foi criada com sucesso. Clique no botão abaixo para ativá-la:</p>

<div style="text-align: center; margin: 32px 0;">
    <a th:href="${confirmationLink}"
       style="background-color: #11B5E4; color: #ffffff; padding: 14px 32px;
                  text-decoration: none; border-radius: 24px; font-weight: bold;
                  font-size: 16px; display: inline-block;">
        Ativar minha conta
    </a>
</div>

<p style="font-size: 14px;">
    Este link expira em <strong>24 horas</strong>.
</p>
<p style="font-size: 14px;">
    Caso não tenha criado uma conta na Rinha Campus IV, pode ignorar este email.
</p>

<hr style="border-color: rgba(255,255,255,0.1); margin-top: 32px;" />
<p style="color: rgba(255,255,255,0.4); font-size: 12px; text-align: center;">
    Rinha Campus IV — Torneio de Games Universitário
</p>
</body>
</html>
