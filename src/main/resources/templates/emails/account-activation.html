<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>Ativação de Conta — Rinha Campus IV</title>
    <!--[if mso]>
    <noscript>
        <xml>
            <o:OfficeDocumentSettings>
                <o:PixelsPerInch>96</o:PixelsPerInch>
            </o:OfficeDocumentSettings>
        </xml>
    </noscript>
    <![endif]-->
</head>
<body style="margin: 0; padding: 0; background-color: #0A122A;
             font-family: Arial, Helvetica, sans-serif; -webkit-text-size-adjust: 100%; -ms-text-size-adjust: 100%;">

<!-- Wrapper externo: garante fundo em clientes que ignoram o body -->
<table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0"
       style="background-color: #0A122A; border-collapse: collapse;">
    <tr>
        <td align="center" style="padding: 0;">

            <!-- Container central com largura fixa -->
            <table role="presentation"
                   style="width: 100%; border-collapse: collapse; background-color: #0A122A;">

                <!-- Header -->
                <tr>
                    <td
                        style="padding: 48px 24px 40px 24px;
                                   border-bottom: 2px solid #FF00EE; align-content: center; text-align: center;">
                        <h1 style="margin: 0;
                                       color: #ffffff;
                                       font-family: Arial, Helvetica, sans-serif;
                                       font-size: 36px;
                                       font-weight: 700;
                                       letter-spacing: 1px;
                                       line-height: 1.2;">
                            Rinha Campus IV
                        </h1>
                    </td>
                </tr>

                <!-- Saudação -->
                <tr>
                    <td align="center" style="padding: 36px 24px 0 24px;">
                        <p style="margin: 0;
                                      color: #ffffff;
                                      font-family: Arial, Helvetica, sans-serif;
                                      font-size: 24px;
                                      font-weight: 700;
                                      text-align: center;
                                      line-height: 1.3;">
                            Olá, <span th:text="${username}">nomeDoUsuário</span>!
                        </p>
                    </td>
                </tr>

                <!-- Mensagem -->
                <tr>
                    <td align="center" style="padding: 28px 40px 0 40px;">
                        <p style="margin: 0;
                                      color: #ffffff;
                                      font-family: Arial, Helvetica, sans-serif;
                                      font-size: 18px;
                                      font-weight: 400;
                                      text-align: center;
                                      line-height: 1.6;">
                            Sua conta foi criada com sucesso. Clique no botão abaixo para ativá-la:
                        </p>
                    </td>
                </tr>

                <!-- Botão de ativação -->
                <tr>
                    <td align="center" style="padding: 28px 40px 0 40px;">
                        <table role="presentation" cellpadding="0" cellspacing="0" border="0">
                            <tr>
                                <td align="center"
                                    style="border-radius: 24px;
                                               background-color: #11B5E4;">
                                    <a th:href="${confirmationLink}"
                                       style="display: inline-block;
                                                  background-color: #11B5E4;
                                                  color: #ffffff;
                                                  font-family: Arial, Helvetica, sans-serif;
                                                  font-size: 16px;
                                                  font-weight: 700;
                                                  text-decoration: none;
                                                  padding: 14px 32px;
                                                  border-radius: 24px;
                                                  mso-padding-alt: 0;
                                                  text-align: center;">
                                        Ativar minha conta
                                    </a>
                                </td>
                            </tr>
                        </table>
                    </td>
                </tr>

                <!-- Aviso de expiração -->
                <tr>
                    <td align="center" style="padding: 28px 40px 40px 40px;">
                        <table role="presentation" cellpadding="0" cellspacing="0" border="0"
                               width="420"
                               style="width: 420px;
                                          border-collapse: collapse;
                                          background-color: #11204C;
                                          border: 1px solid #01F7FF;">
                            <tr>
                                <td align="center" style="padding: 20px 24px;">
                                    <p style="margin: 0;
                                                  color: #ffffff;
                                                  font-family: Arial, Helvetica, sans-serif;
                                                  font-size: 14px;
                                                  font-weight: 400;
                                                  text-align: center;
                                                  line-height: 1.6;">
                                        Este link expira em <strong>24 horas</strong>.
                                        Caso não tenha criado uma conta na Rinha Campus IV,
                                        pode ignorar este email.
                                    </p>
                                </td>
                            </tr>
                        </table>
                    </td>
                </tr>

                <!-- Footer -->
                <tr>
                    <td align="center"
                        style="padding: 20px 24px;
                                   border-top: 1px solid rgba(255,255,255,0.1);">
                        <p style="margin: 0;
                                      color: #777777;
                                      font-family: Arial, Helvetica, sans-serif;
                                      font-size: 11px;
                                      text-align: center;
                                      line-height: 1.5;">
                            Rinha Campus IV — Torneio de Games Universitário
                        </p>
                    </td>
                </tr>

            </table>
            <!-- /Container central -->

        </td>
    </tr>
</table>
<!-- /Wrapper externo -->

</body>
</html>
